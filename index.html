<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Enter Code</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }

  .page {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 480px;
    animation: fadeIn 0.4s ease;
  }
  .page.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 36px 28px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  h1 { font-size: 1.6rem; margin-bottom: 24px; }
  h2 { font-size: 1.3rem; margin-bottom: 20px; color: var(--muted); }

  .input-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 20px;
  }
  .input-wrap input {
    width: 100%;
    padding: 14px 50px 14px 18px;
    border: 2px solid #333;
    border-radius: 12px;
    background: #111;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .toggle-eye {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px;
  }

  .error-msg {
    color: var(--accent);
    font-size: 0.85rem;
    min-height: 1.2em;
    margin-bottom: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    margin-bottom: 8px;
  }
  .emoji-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

  .emoji-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 8px;
    border: 2px solid #333;
    border-radius: 16px;
    background: #111;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .emoji-btn:active { transform: scale(0.94); }
  .emoji-btn:hover  { border-color: var(--accent); background: #1e1028; }
  .emoji-btn.selected { border-color: var(--accent); background: var(--accent); }
  .emoji-btn.selected .label { color: rgba(255,255,255,.8); }

  .emoji-btn .icon { font-size: 2.6rem; line-height: 1; }
  .emoji-btn .label { font-size: 0.8rem; color: var(--muted); }

  .poem {
    white-space: pre-wrap;
    font-size: 1.05rem;
    line-height: 1.7;
    margin-bottom: 28px;
    color: #ccc;
  }

  .checkmark { font-size: 3.5rem; margin-bottom: 16px; }
  .copied-toast {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #6f6;
    min-height: 1.2em;
  }

  /* ── Day & Time picker ── */
  .day-picker {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-bottom: 20px;
  }
  .day-btn {
    flex: 1;
    padding: 14px 6px;
    border: 2px solid #333;
    border-radius: 12px;
    background: #111;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .day-btn:active { transform: scale(0.95); }
  .day-btn:hover  { border-color: var(--accent); background: #1e1028; }
  .day-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
  .day-btn .day-name { font-weight: 700; font-size: 0.95rem; }
  .day-btn .day-date { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .day-btn.selected .day-date { color: rgba(255,255,255,.8); }

  .time-label {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .time-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 8px;
  }
  .time-btn {
    padding: 12px 6px;
    border: 2px solid #333;
    border-radius: 10px;
    background: #111;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .time-btn:active { transform: scale(0.95); }
  .time-btn:hover  { border-color: var(--accent); background: #1e1028; }

  .time-grid.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  /* ── Date ask page ── */
  .ask-buttons {
    display: flex;
    gap: 16px;
    width: 100%;
  }
  .ask-btn {
    flex: 1;
    padding: 16px 10px;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .ask-btn:active { transform: scale(0.95); opacity: 0.85; }
  .ask-btn.yes { background: #27ae60; color: #fff; }
  .ask-btn.no  { background: #555; color: #fff; }

  /* ── Oops modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .modal-overlay.visible { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  .modal-box img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .modal-box p {
    font-size: 1.15rem;
    margin-bottom: 20px;
    font-weight: 600;
  }

  @media (max-width: 400px) {
    .card { padding: 28px 18px; }
    .emoji-btn .icon { font-size: 2.2rem; }
    .emoji-grid { gap: 10px; }
    .time-grid { grid-template-columns: repeat(2, 1fr); }
    .day-btn { padding: 12px 4px; }
    .day-btn .day-name { font-size: 0.85rem; }
    .modal-box img { width: 140px; height: 140px; }
  }
</style>
</head>
<body>

<!-- PAGE 1: PASSWORD -->
<div id="page-password" class="page active">
  <div class="card">
    <h1>Secret Code &#128064;</h1>
    <div class="input-wrap">
      <input id="pw" type="password" placeholder="Enter the code..." autocomplete="off" autocapitalize="off">
      <button class="toggle-eye" id="toggleEye" aria-label="Toggle visibility">&#128584;</button>
    </div>
    <div class="error-msg" id="pwError"></div>
    <button class="btn" id="btnUnlock">Enter</button>
  </div>
</div>

<!-- PAGE 2: DATE ASK -->
<div id="page-ask" class="page">
  <div class="card">
    <h1>Do you want to go on a date with me? &#127803;&#129325;</h1>
    <div class="ask-buttons">
      <button class="ask-btn no" id="btnNo">No</button>
      <button class="ask-btn yes" id="btnYes">Yes</button>
    </div>
  </div>
</div>

<!-- OOPS MODAL -->
<div class="modal-overlay" id="oopsModal">
  <div class="modal-box">
    <img src="https://i.pinimg.com/736x/e8/60/14/e86014fe973a07eca065c13874b79a1b.jpg" alt="Spongebob teehee">
    <p>Oops, wrong button teehee</p>
    <button class="btn" id="btnOopsBack">Go Back</button>
  </div>
</div>

<!-- PAGE 3: POEM -->
<div id="page-poem" class="page">
  <div class="card">
    <h1>A Little Something&hellip;</h1>
    <div class="poem" id="poemText">POEM</div>
    <button class="btn" id="btnNext">Next &rarr;</button>
  </div>
</div>

<!-- PAGE 3: DAY & TIME -->
<div id="page-datetime" class="page">
  <div class="card">
    <h1>Pick a Day and Time</h1>
    <div class="day-picker" id="dayPicker"></div>
    <div class="time-label" id="timeLabel">Select a day first</div>
    <div class="time-grid disabled" id="timeGrid"></div>
  </div>
</div>

<!-- PAGE 4: FOOD -->
<div id="page-food" class="page">
  <div class="card">
    <h2>Pick your cravings</h2>
    <div class="emoji-grid" id="foodGrid"></div>
    <div style="margin-top:16px;display:flex;gap:10px;width:100%;">
      <input type="text" id="customFood" placeholder="Or type your own..." style="flex:1;padding:12px 16px;border:2px solid #333;border-radius:12px;background:#111;color:#eee;font-size:0.95rem;outline:none;">
      <button class="btn" id="btnAddFood" style="padding:12px 20px;font-size:0.9rem;">Add</button>
    </div>
    <button class="btn" id="btnFoodNext" style="margin-top:16px;">Next &rarr;</button>
  </div>
</div>

<!-- PAGE 4: ACTIVITY -->
<div id="page-activity" class="page">
  <div class="card">
    <h2>Pick activities</h2>
    <div class="emoji-grid" id="activityGrid"></div>
    <div style="margin-top:16px;display:flex;gap:10px;width:100%;">
      <input type="text" id="customActivity" placeholder="Or type your own..." style="flex:1;padding:12px 16px;border:2px solid #333;border-radius:12px;background:#111;color:#eee;font-size:0.95rem;outline:none;">
      <button class="btn" id="btnAddActivity" style="padding:12px 20px;font-size:0.9rem;">Add</button>
    </div>
    <button class="btn" id="btnActivityNext" style="margin-top:16px;">Next &rarr;</button>
  </div>
</div>

<!-- PAGE 5: THANK YOU -->
<div id="page-thanks" class="page">
  <div class="card">
    <div class="checkmark">&#10024;</div>
    <h1>Thank you!</h1>
    <h2>Copy and paste into chat</h2>
    <button class="btn" id="btnCopy">Copy Results</button>
    <div class="copied-toast" id="toast"></div>
    <br>
    <button class="btn" id="btnChange" style="background:#555;margin-top:8px;padding:10px 20px;font-size:0.8rem;">Change Choices</button>
  </div>
</div>

<script>
/* ============================================
   CONFIGURATION - edit these two values
   ============================================ */
const PASSWORD_HASH = "d9041dc714b82eed39bd4e557b8f01417a2593c9974f93013d52fb36bde68fc7";  // <-- hash of current password
// To change the password:
//   1. Open this page in a browser
//   2. Open the console (F12 > Console)
//   3. Type: generateHash("yournewpassword")
//   4. Copy the hash and replace PASSWORD_HASH above
/* ============================================ */

async function hashText(text) {
  var encoder = new TextEncoder();
  var data = encoder.encode(text);
  var buffer = await crypto.subtle.digest('SHA-256', data);
  var arr = Array.from(new Uint8Array(buffer));
  return arr.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

async function generateHash(password) {
  var hash = await hashText(password);
  console.log('Hash for "' + password + '":\n' + hash);
  console.log('Replace PASSWORD_HASH in the code with this value.');
  return hash;
}

const results = {};

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* -- Password page -- */
const pwInput   = document.getElementById('pw');
const pwError   = document.getElementById('pwError');
const toggleEye = document.getElementById('toggleEye');

toggleEye.addEventListener('click', function() {
  var hidden = pwInput.type === 'password';
  pwInput.type = hidden ? 'text' : 'password';
  toggleEye.innerHTML = hidden ? '&#128065;&#65039;' : '&#128584;';
});

document.getElementById('btnUnlock').addEventListener('click', checkPw);
pwInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPw(); });

async function checkPw() {
  var hash = await hashText(pwInput.value);
  if (hash === PASSWORD_HASH) {
    pwError.textContent = '';
    show('page-ask');
  } else {
    pwError.textContent = 'Wrong code, try again!';
    pwInput.value = '';
    pwInput.focus();
  }
}

/* -- Date ask page -- */
document.getElementById('btnYes').addEventListener('click', function() { show('page-poem'); });
document.getElementById('btnNo').addEventListener('click', function() {
  document.getElementById('oopsModal').classList.add('visible');
});
document.getElementById('btnOopsBack').addEventListener('click', function() {
  document.getElementById('oopsModal').classList.remove('visible');
});

/* -- Day & Time picker -- */
(function() {
  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Find next Friday (or today if already Fri/Sat/Sun)
  var today = new Date();
  today.setHours(0,0,0,0);
  var dow = today.getDay(); // 0=Sun ... 6=Sat
  var daysUntilFri;
  if (dow === 5) daysUntilFri = 0;       // today is Friday
  else if (dow === 6) daysUntilFri = 6;   // Saturday -> next Friday
  else if (dow === 0) daysUntilFri = 5;   // Sunday -> next Friday
  else daysUntilFri = 5 - dow;            // Mon-Thu -> this Friday

  var friday = new Date(today);
  friday.setDate(today.getDate() + daysUntilFri);

  var weekendDays = [];
  for (var i = 0; i < 3; i++) {
    var d = new Date(friday);
    d.setDate(friday.getDate() + i);
    weekendDays.push(d);
  }

  var dayPicker = document.getElementById('dayPicker');
  var timeGrid  = document.getElementById('timeGrid');
  var timeLabel = document.getElementById('timeLabel');
  var selectedDay = null;

  weekendDays.forEach(function(date) {
    var btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.innerHTML = '<div class="day-name">' + DAYS[date.getDay()] + '</div>' +
                    '<div class="day-date">' + MONTHS[date.getMonth()] + ' ' + date.getDate() + '</div>';
    btn.addEventListener('click', function() {
      selectedDay = DAYS[date.getDay()] + ', ' + MONTHS[date.getMonth()] + ' ' + date.getDate();
      dayPicker.querySelectorAll('.day-btn').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      timeLabel.textContent = 'Pick a time';
      timeGrid.classList.remove('disabled');
    });
    dayPicker.appendChild(btn);
  });

  // Generate times 5:00 PM - 8:30 PM in 30-min increments
  var times = [];
  for (var h = 17; h <= 20; h++) {
    for (var m = 0; m < 60; m += 30) {
      if (h === 20 && m > 30) break; // stop at 8:30 PM
      var hour12 = h > 12 ? h - 12 : h;
      var label = hour12 + ':' + (m === 0 ? '00' : '30') + ' PM';
      times.push(label);
    }
  }

  times.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'time-btn';
    btn.textContent = t;
    btn.addEventListener('click', function() {
      if (!selectedDay) return;
      results.day = selectedDay;
      results.time = t;
      show('page-food');
    });
    timeGrid.appendChild(btn);
  });
})();

/* -- Poem next -- */
document.getElementById('btnNext').addEventListener('click', function() { show('page-datetime'); });

/* -- Food grid -- */
var foods = [
  { emoji: '\uD83C\uDF54', label: 'Hamburgers',   value: 'hamburgers' },
  { emoji: '\uD83C\uDF63', label: 'Sushi/Poke',   value: 'sushi/poke' },
  { emoji: '\uD83E\uDD5F', label: 'Empanada',     value: 'empanada' },
  { emoji: '\uD83C\uDF2E', label: 'Tacos',         value: 'tacos' },
  { emoji: '\uD83C\uDF5D', label: 'Pasta',        value: 'pasta' },
  { emoji: '\uD83C\uDF66', label: 'Postre',       value: 'postre' },
  { emoji: '\uD83D\uDD25', label: 'Parrillada',   value: 'parrillada' },
  { emoji: '\uD83E\uDD69', label: 'Steak',        value: 'steak' },
  { emoji: '\uD83C\uDF57', label: 'Chicken/Wings', value: 'fried chicken/wings' },
];

var selectedFoods = [];
var foodGrid = document.getElementById('foodGrid');
foods.forEach(function(f) {
  var btn = document.createElement('button');
  btn.className = 'emoji-btn';
  btn.innerHTML = '<span class="icon">' + f.emoji + '</span><span class="label">' + f.label + '</span>';
  btn.addEventListener('click', function() {
    var idx = selectedFoods.indexOf(f.value);
    if (idx === -1) {
      selectedFoods.push(f.value);
      btn.classList.add('selected');
    } else {
      selectedFoods.splice(idx, 1);
      btn.classList.remove('selected');
    }
  });
  foodGrid.appendChild(btn);
});

/* -- Custom food input -- */
var customFoodInput = document.getElementById('customFood');
document.getElementById('btnAddFood').addEventListener('click', addCustomFood);
customFoodInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addCustomFood(); });
function addCustomFood() {
  var val = customFoodInput.value.trim();
  if (!val) return;
  if (selectedFoods.indexOf(val) === -1) selectedFoods.push(val);
  customFoodInput.value = '';
}

/* -- Food next -- */
document.getElementById('btnFoodNext').addEventListener('click', function() {
  if (selectedFoods.length === 0) return;
  results.food = selectedFoods.join(', ');
  show('page-activity');
});

/* -- Activity grid -- */
var activities = [
  { emoji: '\uD83C\uDFAC', label: 'Movies',          value: 'movies' },
  { emoji: '\uD83D\uDCDA', label: 'Books',           value: 'books' },
  { emoji: '\uD83C\uDFAE', label: 'Games',           value: 'games' },
  { emoji: '\uD83C\uDFA8', label: 'Paint',           value: 'paint' },
  { emoji: '\uD83D\uDC69\u200D\uD83C\uDF73', label: 'Cooking',         value: 'cooking' },
  { emoji: '\uD83E\uDDE0', label: "Couple's Trivia", value: "couple's trivia" },
  { emoji: '\uD83D\uDCAC', label: 'Chismear',        value: 'chismear' },
];

var selectedActivities = [];
var actGrid = document.getElementById('activityGrid');
activities.forEach(function(a) {
  var btn = document.createElement('button');
  btn.className = 'emoji-btn';
  btn.innerHTML = '<span class="icon">' + a.emoji + '</span><span class="label">' + a.label + '</span>';
  btn.addEventListener('click', function() {
    var idx = selectedActivities.indexOf(a.value);
    if (idx === -1) {
      selectedActivities.push(a.value);
      btn.classList.add('selected');
    } else {
      selectedActivities.splice(idx, 1);
      btn.classList.remove('selected');
    }
  });
  actGrid.appendChild(btn);
});

/* -- Custom activity input -- */
var customActInput = document.getElementById('customActivity');
document.getElementById('btnAddActivity').addEventListener('click', addCustomActivity);
customActInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addCustomActivity(); });
function addCustomActivity() {
  var val = customActInput.value.trim();
  if (!val) return;
  if (selectedActivities.indexOf(val) === -1) selectedActivities.push(val);
  customActInput.value = '';
}

/* -- Activity next -- */
document.getElementById('btnActivityNext').addEventListener('click', function() {
  if (selectedActivities.length === 0) return;
  results.activity = selectedActivities.join(', ');
  show('page-thanks');
});

/* -- Change choices -- */
document.getElementById('btnChange').addEventListener('click', function() { show('page-datetime'); });

/* -- Copy results -- */
document.getElementById('btnCopy').addEventListener('click', function() {
  var text = 'Date: ' + results.day + '\nTime: ' + results.time + '\nFood: ' + results.food + '\nActivity: ' + results.activity;
  var toast = document.getElementById('toast');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      toast.textContent = 'Copied!';
    }).catch(function() {
      fallbackCopy(text, toast);
    });
  } else {
    fallbackCopy(text, toast);
  }
  setTimeout(function() { toast.textContent = ''; }, 2500);
});

function fallbackCopy(text, toast) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(0, ta.value.length);
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast.textContent = 'Copied!';
}
</script>
</body>
</html>
